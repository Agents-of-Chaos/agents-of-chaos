name: funding-nightly

# Nightly maintenance for the /funding landscape map (see docs/superpowers/plans/
# 2026-07-03-funding-nightly.md). One task per night, opened as a PR — never a
# push to main. Runs on GitHub Actions rather than a cloud routine because the
# repo is the deliverable and key sources (coefficientgiving.org) block
# datacenter egress; runners fetch them fine. Needs the ANTHROPIC_API_KEY repo
# secret (already set for nightly-explainers).

on:
  schedule:
    - cron: "0 9 * * *" # 09:00 UTC nightly (spaced from nightly-explainers at 08:00)
  workflow_dispatch: {} # manual runs from the Actions tab

permissions:
  contents: write
  pull-requests: write
  id-token: write # required by claude-code-action@v1 for its OIDC token exchange

concurrency:
  group: funding-nightly
  cancel-in-progress: false

jobs:
  maintain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: astral-sh/setup-uv@v5

      - name: Install site deps (so npm test / npm run build just work)
        run: npm ci

      - name: Configure git identity
        run: |
          git config --global user.email "claude[bot]@users.noreply.github.com"
          git config --global user.name "claude[bot]"

      - uses: anthropics/claude-code-action@v1
        with:
          # Use the workflow token directly: the Claude GitHub App is not installed
          # on this org, so the default OIDC->app-token exchange 401s.
          github_token: ${{ secrets.GITHUB_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Surface the SDK stream in logs: scheduled runs died instantly (is_error,
          # 1 turn, $0) for 4 nights starting 2026-07-12 with the error text hidden.
          # The model is pinned (same one scripts/generate-explainers.mjs uses) so the
          # job doesn't ride Claude Code's default, which currently routes to the
          # capacity-gated 1M-context beta variant.
          show_full_output: true
          claude_args: >-
            --model claude-opus-4-8
            --max-turns 60
            --allowedTools 'Edit,MultiEdit,Write,Read,Glob,Grep,LS,WebFetch,WebSearch,Bash(git:*),Bash(gh:*),Bash(uv:*),Bash(node:*),Bash(npm:*),Bash(python3:*),Bash(ls:*),Bash(cat:*)'
          prompt: |
            You are the nightly maintainer of src/data/funding.json — the dataset behind
            agents-of-chaos.ai/funding, a public dollar-weighted map of the AI-safety
            funding landscape. Read experiments/funding/README.md first, then
            src/data/funding.json (note meta.generatedAt and each funder's
            apply.lastVerified).

            Do exactly ONE task tonight, the first that applies:

            (a) RE-VERIFY: find funders whose apply.lastVerified is more than 14 days
                old, or whose apply.deadline falls within 7 days of today (past or
                future). Pick the 3 stalest. For each, WebFetch its apply.url and update
                mode / deadline / notes / lastVerified to what the live page says.
                Where to edit: funders present in experiments/funding/enrich/enriched.json
                are updated THERE (the build merges it); the original starter funders'
                apply blocks live in experiments/funding/seeds/starter_funding.json.
                Also bump GENERATED_AT in experiments/funding/build_funding.py to today.

            (b) MONTHLY RE-PULL: if today is the 1st of the month, run every
                experiments/funding/fetch_*.py with uv run (they cache and tolerate
                blocked sources), then rebuild. Summarize what moved in the PR body.

            (c) GROW: take the FIRST entry of experiments/funding/seeds/backlog.json.
                Research it with WebSearch/WebFetch: official site, one-line factual
                blurb, thesis near their own words, application mechanics (mode
                rolling/rounds/invite-only/closed; a dated deadline ONLY if a live page
                shows one), AI-safety-relevant dollars ONLY if a primary source states a
                figure (basis {year, method, sourceUrl, kind: annual-rate|commitment}),
                up to 2 people from the funder's own staff page, domainTags from the
                taxonomy in src/data/funding.json meta.domains, 1-3 sources. Then: add a
                seed entry to experiments/funding/seeds/funders_v1.json, append the
                record to the funders array of experiments/funding/enrich/enriched.json,
                remove the entry from backlog.json, and bump GENERATED_AT in
                build_funding.py to today.

            Then ALWAYS:
            1. uv run experiments/funding/build_funding.py
            2. python3 -m pytest experiments/funding/tests/ -q
            3. npm test && npm run build
            All four must pass — if you cannot make them pass without breaking a rule
            below, stop and open NO pr; exit cleanly instead.
            4. If src/data/funding.json changed: create branch
               funding-nightly-<YYYYMMDD>, commit everything you edited, push, and open
               a PR to main titled "funding nightly: <what changed>" whose body lists
               EVERY changed or added dollar figure and apply-status with its source
               URL. If nothing changed, do not open a PR.

            HARD RULES (breaking one is worse than doing nothing):
            - NEVER invent, estimate, extrapolate, or currency-convert-by-guess a dollar
              figure. No primary source = null.
            - Never read or write private/ or any file outside experiments/funding/,
              src/data/funding.json, and your branch/PR mechanics.
            - Never delete a verified record — demote (verified:false, or mode closed
              with a dated note) instead.
            - Never change an existing node id. Never edit src/data/companies.json.
            - Never commit to main directly.
